<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="app.css" />
  <style>
    .qrDock {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: #fff;
      border: 1px solid var(--color-border, #ddd);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.12);
      max-width: 180px;
      z-index: 50;
    }

    .qrDock.hidden {
      display: none;
    }

    .qrTitle {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .qrText {
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.3;
    }

    .qrCodeText {
      font-size: 13px;
      font-weight: 700;
      margin-top: 6px;
    }

    #qrBox {
      width: 140px;
      min-height: 140px;
    }

    #qrBox img,
    #qrBox canvas {
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 700px) {
      .qrDock {
        right: 10px;
        bottom: 10px;
        padding: 8px;
        max-width: 150px;
      }

      #qrBox {
        width: 120px;
        min-height: 120px;
      }

      .qrTitle {
        font-size: 12px;
      }

      .qrText,
      .qrCodeText {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <h1>Plenum</h1>

  <div id="msgBox" class="mt20" aria-live="polite"></div>

  <div id="heroBox" class="mt20">
    <strong>Spørsmål</strong><br>
    Venter på oppstart…
  </div>

  <div id="resultBox" class="mt20">
    <strong>Resultat</strong><br>
    Venter på aktiv runde…
  </div>

  <details id="techDetails" class="mt20">
    <summary><strong>Vis teknisk info</strong></summary>
    <div id="connectBox" class="mt20"></div>
    <div id="stateBox" class="mt20"></div>
  </details>

  <div id="qrDock" class="qrDock hidden" aria-live="polite">
    <div class="qrTitle">Scan for å delta</div>
    <div id="qrBox"></div>
    <div class="qrCodeText mono" id="qrCodeText"></div>
    <div class="qrText">Mobilen går rett til svarskjermen.</div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- Lite QR-bibliotek -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script src="config.js"></script>
  <script src="app.js"></script>

  <script>
    const heroBox = document.getElementById("heroBox");
    const connectBox = document.getElementById("connectBox");
    const stateBox = document.getElementById("stateBox");
    const resultBox = document.getElementById("resultBox");
    const msgBox = document.getElementById("msgBox");

    const qrDock = document.getElementById("qrDock");
    const qrBox = document.getElementById("qrBox");
    const qrCodeText = document.getElementById("qrCodeText");

    let unsubState = null;
    let unsubAgg = null;

    let sessionId = null;
    let joinCode = null;

    let currentRoundId = null;

    let lastState = null;
    let lastAgg = null;

    let qrInstance = null;
    let lastQrUrl = null;

    function setMsg(html) {
      msgBox.innerHTML = html || "";
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function safeJson(v) {
      try { return JSON.stringify(v, null, 2); } catch { return String(v); }
    }

    function parseQuery() {
      const p = new URLSearchParams(window.location.search);
      const s = p.get("sessionId");
      const j = p.get("joinCode");
      return {
        sessionId: s && s.trim() ? s.trim() : null,
        joinCode: j && j.trim() ? j.trim().toUpperCase().trim() : null
      };
    }

    function buildParticipantUrl(code) {
      const u = new URL("innhenting.html", window.location.href);
      u.searchParams.set("joinCode", String(code).toUpperCase());
      return u.toString();
    }

    function clearQr() {
      qrBox.innerHTML = "";
      qrCodeText.textContent = "";
      qrDock.classList.add("hidden");
      qrInstance = null;
      lastQrUrl = null;
    }

    function renderQr() {
      if (!joinCode || !/^[A-Z0-9]{6}$/.test(joinCode)) {
        clearQr();
        return;
      }

      const participantUrl = buildParticipantUrl(joinCode);

      if (participantUrl === lastQrUrl) {
        qrCodeText.textContent = joinCode;
        qrDock.classList.remove("hidden");
        return;
      }

      qrBox.innerHTML = "";
      qrCodeText.textContent = joinCode;
      qrDock.classList.remove("hidden");

      qrInstance = new QRCode(qrBox, {
        text: participantUrl,
        width: 140,
        height: 140,
        correctLevel: QRCode.CorrectLevel.M
      });

      lastQrUrl = participantUrl;
    }

    function renderConnect() {
      connectBox.innerHTML = `
        <strong>Tilkobling</strong><br>
        sessionId: <span class="mono">${escapeHtml(sessionId || "-")}</span><br>
        joinCode: <span class="mono">${escapeHtml(joinCode || "-")}</span><br>
        Tips: Åpne display med <span class="mono">?joinCode=ABC123</span> eller <span class="mono">?sessionId=...</span>
      `;
    }

    function renderState(state) {
      if (!state) {
        stateBox.innerHTML = `<strong>State</strong><br>Ingen state/live funnet (mangler doc eller ingen tilgang).`;
        return;
      }

      stateBox.innerHTML = `
        <strong>State (live)</strong><br>
        status: <span class="mono">${escapeHtml(state.status ?? "-")}</span><br>
        mode: <span class="mono">${escapeHtml(state.mode ?? "-")}</span><br>
        roundId: <span class="mono">${escapeHtml(state.roundId ?? "-")}</span><br>
        question: <pre class="pre">${escapeHtml(safeJson(state.question))}</pre>
      `;
    }

    function renderHero(state) {
      if (!state) {
        heroBox.innerHTML = `
          <strong>Spørsmål</strong><br>
          Venter på oppstart…
        `;
        return;
      }

      const status = state.status || null;
      const mode = state.mode || null;
      const roundId = state.roundId || null;
      const questionText = state.question && state.question.text
        ? String(state.question.text).trim()
        : "";

      const statusText = status ? String(status) : "-";
      const modeText = mode ? String(mode).toUpperCase() : "-";

      if (!questionText) {
        heroBox.innerHTML = `
          <strong>Spørsmål</strong><br>
          <span class="mono">Mode:</span> ${escapeHtml(modeText)}<br>
          <span class="mono">Status:</span> ${escapeHtml(statusText)}<br>
          <span class="mono">Runde:</span> ${escapeHtml(roundId || "-")}<br><br>
          Venter på spørsmålsformulering…
        `;
        return;
      }

      heroBox.innerHTML = `
        <strong>Spørsmål</strong><br>
        <span class="mono">Mode:</span> ${escapeHtml(modeText)}<br>
        <span class="mono">Status:</span> ${escapeHtml(statusText)}<br>
        <span class="mono">Runde:</span> ${escapeHtml(roundId || "-")}<br><br>
        <div>${escapeHtml(questionText)}</div>
      `;
    }

    function clearResults() {
      resultBox.innerHTML = `
        <strong>Resultat</strong><br>
        Ingen data å vise akkurat nå.
      `;
    }

    function renderStandby() {
      heroBox.innerHTML = `
        <strong>Spørsmål</strong><br>
        Venter på oppstart…
      `;

      resultBox.innerHTML = `
        <strong>Venter på oppstart</strong><br>
        Denne skjermen er klar, men det er ingen aktiv kobling akkurat nå.<br><br>
        Åpne display med:<br>
        <span class="mono">display.html?joinCode=ABC123</span><br>
        eller<br>
        <span class="mono">display.html?sessionId=...</span>
      `;
    }

    function renderLoadingState() {
      resultBox.innerHTML = `
        <strong>Resultat</strong><br>
        Laster <span class="mono">state/live</span>…
      `;
    }

    function renderWaitingForRound() {
      resultBox.innerHTML = `
        <strong>Resultat</strong><br>
        State er lastet, men venter på aktiv <span class="mono">roundId</span>…
      `;
    }

    function renderMissingAgg(mode, roundId, status) {
      const statusLine = (status === "collect")
        ? `Innsamling pågår (<span class="mono">collect</span>)`
        : (status === "results")
          ? `Resultater vises (<span class="mono">results</span>)`
          : (status === "paused")
            ? `Pause (<span class="mono">paused</span>)`
            : `Status: <span class="mono">${escapeHtml(status || "-")}</span>`;

      resultBox.innerHTML = `
        <strong>Resultat (${escapeHtml((mode || "-").toUpperCase())})</strong><br>
        ${statusLine}<br>
        roundId: <span class="mono">${escapeHtml(roundId || "-")}</span><br><br>
        Ingen aggregert data ennå.
      `;
    }

    function buildChoiceLabelMap(question) {
      const map = {};
      const q = question || {};
      const choices = Array.isArray(q.choices) ? q.choices : [];
      for (const c of choices) {
        if (!c) continue;
        const id = (c.id != null) ? String(c.id) : null;
        const label = (c.label != null) ? String(c.label) : (id || "");
        if (id) map[id] = label || id;
      }
      return map;
    }

    function getStatusLine(status) {
      if (status === "collect") {
        return `Innsamling pågår (<span class="mono">collect</span>)`;
      }
      if (status === "results") {
        return `Resultater vises (<span class="mono">results</span>)`;
      }
      if (status === "paused") {
        return `Pause (<span class="mono">paused</span>)`;
      }
      return `Status: <span class="mono">${escapeHtml(status || "-")}</span>`;
    }

    function getMultiBarClass(index, total) {
      if (total === 2) {
        return index === 0 ? "multiBar--green" : "multiBar--red";
      }

      if (total === 3) {
        if (index === 0) return "multiBar--green";
        if (index === 1) return "multiBar--yellow";
        return "multiBar--red";
      }

      const palette = [
        "multiBar--blue",
        "multiBar--green",
        "multiBar--yellow",
        "multiBar--red",
        "multiBar--purple",
        "multiBar--teal",
        "multiBar--slate"
      ];

      return palette[index % palette.length];
    }

    function renderMulti(state, agg) {
      const status = state.status || null;
      const roundId = state.roundId || null;

      if (!agg) {
        renderMissingAgg("multi", roundId, status);
        return;
      }

      const counts = (agg.counts && typeof agg.counts === "object") ? agg.counts : {};
      const n = (typeof agg.n === "number") ? agg.n : 0;

      const labelMap = buildChoiceLabelMap(state.question);
      const qChoices = (state.question && Array.isArray(state.question.choices)) ? state.question.choices : [];
      const haveChoiceList = qChoices.length >= 2;

      let entries = [];

      if (haveChoiceList) {
        entries = qChoices.map((c, idx) => {
          const id = (c && c.id != null) ? String(c.id) : ("choice_" + (idx + 1));
          const label = (c && (c.label || c.text)) ? String(c.label || c.text) : (labelMap[id] || id);
          const count = (typeof counts[id] === "number") ? counts[id] : 0;
          return { id, label, count };
        });
      } else {
        entries = Object.entries(counts).map(([id, count]) => ({
          id: String(id),
          label: labelMap[String(id)] || String(id),
          count: typeof count === "number" ? count : 0
        }));
      }

      if (!entries.length) {
        renderMissingAgg("multi", roundId, status);
        return;
      }

      const barsHtml = entries.map((entry, idx) => {
        const pct = n > 0 ? Math.round((entry.count / n) * 100) : 0;
        const heightPct = Math.max(pct, entry.count > 0 ? 4 : 0);
        const barClass = getMultiBarClass(idx, entries.length);

        return `
          <div class="multiBarWrap">
            <div class="multiBarValue">
              ${pct} %
              <span class="multiBarValueSub">${entry.count} svar</span>
            </div>
            <div class="multiBarTrack">
              <div class="multiBar ${barClass}" style="height:${heightPct}%;"></div>
            </div>
            <div class="multiBarLabel">${escapeHtml(entry.label)}</div>
          </div>
        `;
      }).join("");

      resultBox.innerHTML = `
        <strong>Resultat (MULTI)</strong><br>
        ${getStatusLine(status)}<br>
        roundId: <span class="mono">${escapeHtml(roundId)}</span><br>
        n: <span class="mono">${n}</span><br>

        <div class="multiChart">
          ${barsHtml}
        </div>

        <div class="multiLegend">
          Søylene viser prosentvis fordeling av alle innsendte svar i denne runden.
        </div>
      `;
    }

    function renderLikert(state, agg) {
      const status = state.status || null;
      const roundId = state.roundId || null;

      if (!agg) {
        renderMissingAgg("likert", roundId, status);
        return;
      }

      const n = (typeof agg.n === "number") ? agg.n : 0;
      const sum = (typeof agg.sum === "number") ? agg.sum : 0;
      const count = (typeof agg.count === "number") ? agg.count : 0;
      const avg = count > 0 ? (sum / count) : 0;

      resultBox.innerHTML = `
        <strong>Resultat (LIKERT)</strong><br>
        ${getStatusLine(status)}<br>
        roundId: <span class="mono">${escapeHtml(roundId)}</span><br>
        n: <span class="mono">${n}</span><br>
        count: <span class="mono">${count}</span><br>
        sum: <span class="mono">${sum}</span><br>
        snitt: <span class="mono">${count > 0 ? avg.toFixed(2) : "-"}</span>
      `;
    }

    function renderOpen(state, agg) {
      const status = state.status || null;
      const roundId = state.roundId || null;

      if (!agg) {
        renderMissingAgg("open", roundId, status);
        return;
      }

      const n = (typeof agg.n === "number") ? agg.n : 0;
      const texts = Array.isArray(agg.texts) ? agg.texts : [];

      let items = "";
      if (!texts.length) {
        items = `<li>(ingen svar ennå)</li>`;
      } else {
        items = texts.map(t => `<li>${escapeHtml(String(t))}</li>`).join("");
      }

      resultBox.innerHTML = `
        <strong>Resultat (OPEN)</strong><br>
        ${getStatusLine(status)}<br>
        roundId: <span class="mono">${escapeHtml(roundId)}</span><br>
        n: <span class="mono">${n}</span><br>

        <div class="mt20">
          <strong>Svar</strong>
          <ol class="mt20">
            ${items}
          </ol>
        </div>
      `;
    }

    function renderWordcloud(state, agg) {
      const status = state.status || null;
      const roundId = state.roundId || null;

      if (!agg) {
        renderMissingAgg("wordcloud", roundId, status);
        return;
      }

      const n = (typeof agg.n === "number") ? agg.n : 0;
      const freq = (agg.freq && typeof agg.freq === "object") ? agg.freq : {};

      const entries = Object.entries(freq)
        .sort((a, b) => (b[1] || 0) - (a[1] || 0));

      let rows = "";
      if (!entries.length) {
        rows = `<tr><td>(ingen ord ennå)</td><td class="mono">0</td></tr>`;
      } else {
        rows = entries.map(([word, count]) => {
          return `<tr><td>${escapeHtml(String(word))}</td><td class="mono">${typeof count === "number" ? count : 0}</td></tr>`;
        }).join("");
      }

      resultBox.innerHTML = `
        <strong>Resultat (WORDCLOUD)</strong><br>
        ${getStatusLine(status)}<br>
        roundId: <span class="mono">${escapeHtml(roundId)}</span><br>
        n: <span class="mono">${n}</span><br>

        <table class="mt20">
          <thead><tr><th>Ord</th><th>Antall</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderByMode(state, agg) {
      if (!state) {
        clearResults();
        return;
      }

      const mode = state.mode || null;
      const roundId = state.roundId || null;

      if (!mode) {
        resultBox.innerHTML = `
          <strong>Resultat</strong><br>
          Ingen modus valgt ennå.
        `;
        return;
      }

      if (!roundId) {
        renderWaitingForRound();
        return;
      }

      if (mode === "multi") {
        renderMulti(state, agg);
        return;
      }

      if (mode === "likert") {
        renderLikert(state, agg);
        return;
      }

      if (mode === "open") {
        renderOpen(state, agg);
        return;
      }

      if (mode === "wordcloud") {
        renderWordcloud(state, agg);
        return;
      }

      resultBox.innerHTML = `
        <strong>Resultat</strong><br>
        Ukjent modus: <span class="mono">${escapeHtml(mode)}</span>
      `;
    }

    function render() {
      renderHero(lastState);
      renderByMode(lastState, lastAgg);
      renderQr();
    }

    function detachAgg() {
      if (unsubAgg) unsubAgg();
      unsubAgg = null;
      lastAgg = null;
    }

    function attachAgg(sessionId, roundId) {
      detachAgg();

      unsubAgg = App.listenAgg(
        sessionId,
        roundId,
        (agg) => {
          lastAgg = agg;
          render();
        },
        (err) => {
          const m = err && err.message ? err.message : String(err);
          setMsg("<strong>Kunne ikke lese agg/live.</strong><br><span class=\"mono\">" + escapeHtml(m) + "</span>");
        }
      );
    }

    function attachState(sessionId) {
      if (unsubState) unsubState();

      unsubState = App.listenLiveState(
        sessionId,
        (state) => {
          lastState = state;
          renderState(state);
          setMsg("");

          if (!state) {
            currentRoundId = null;
            detachAgg();
            render();
            return;
          }

          const roundId = state.roundId || null;

          if (!roundId) {
            currentRoundId = null;
            detachAgg();
            render();
            return;
          }

          if (roundId !== currentRoundId) {
            currentRoundId = roundId;
            attachAgg(sessionId, roundId);
          }

          render();
        },
        (err) => {
          const m = err && err.message ? err.message : String(err);
          setMsg("<strong>Kunne ikke lese state/live.</strong><br><span class=\"mono\">" + escapeHtml(m) + "</span>");
        }
      );
    }

    async function boot() {
      const q = parseQuery();
      joinCode = q.joinCode;
      sessionId = q.sessionId;

      renderConnect();
      renderHero(null);
      renderQr();

      if (!sessionId && !joinCode) {
        setMsg("");
        renderStandby();
        return;
      }

      if (!sessionId && joinCode) {
        try {
          const res = await App.resolveJoinCode(joinCode);
          sessionId = res.sessionId;
          renderConnect();
          renderQr();
        } catch (e) {
          const m = e && e.message ? e.message : String(e);
          setMsg(
            "<strong>Koden er ikke aktiv.</strong><br>" +
            "Den kan være utløpt eller feil.<br><br>" +
            "joinCode: <span class=\"mono\">" + escapeHtml(joinCode) + "</span><br>" +
            "<span class=\"mono\">" + escapeHtml(m) + "</span>"
          );
          clearQr();
          renderStandby();
          return;
        }
      }

      if (!sessionId) {
        setMsg("Mangler sessionId. Åpne display med <span class=\"mono\">?joinCode=ABC123</span> eller <span class=\"mono\">?sessionId=...</span>.");
        clearQr();
        renderStandby();
        return;
      }

      renderLoadingState();
      attachState(sessionId);
    }

    boot();
  </script>
</body>
</html>
