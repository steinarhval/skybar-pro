<!DOCTYPE html> 
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Kontroll</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <h1>Kontrollpanel</h1>

  <!-- TOPP-KNAPPER -->
  <div class="btnRow">
    <button id="loginBtn">Logg inn med Google</button>
    <button id="logoutEndBtn" disabled>Logg ut (og avslutt session)</button>
    <button id="topEndSessionBtn" disabled>End session</button>
    <button id="startSessionBtn" disabled>Start ny session</button>
  </div>

  <div id="controlsBox" class="mt20"></div>

  <!-- Steg 7.3: Programmer -->
  <div id="programsBox" class="mt20"></div>

  <div id="sessionBox" class="mt20"></div>
  <div id="leaseBox" class="mt20"></div>
  <div id="statusBox" class="mt20"></div>
  <div id="errorBox" class="mt20"></div>
  <div id="userBox" class="mt20"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script src="config.js"></script>
  <script src="app.js"></script>

  <script>
    const loginBtn = document.getElementById("loginBtn");
    const logoutEndBtn = document.getElementById("logoutEndBtn");
    const topEndSessionBtn = document.getElementById("topEndSessionBtn");
    const startSessionBtn = document.getElementById("startSessionBtn");

    const userBox = document.getElementById("userBox");
    const sessionBox = document.getElementById("sessionBox");
    const leaseBox = document.getElementById("leaseBox");
    const statusBox = document.getElementById("statusBox");
    const errorBox = document.getElementById("errorBox");
    const controlsBox = document.getElementById("controlsBox");
    const programsBox = document.getElementById("programsBox");

    let activeSessionId = null;
    let activeJoinCode = null;

    let unsubscribe = null;
    let leaseTicker = null;
    let lastState = null;

    // --- Steg 7.3 state ---
    let myPrograms = [];
    let currentProgramId = null;

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function setError(msg) {
      if (!msg) { errorBox.innerHTML = ""; return; }
      errorBox.innerHTML = `<strong>Feil:</strong><br><span class="mono">${escapeHtml(msg)}</span>`;
    }

    let statusTimer = null;
    function setStatus(msg, kind) {
      if (statusTimer) clearTimeout(statusTimer);
      if (!msg) { statusBox.innerHTML = ""; return; }

      const label = kind === "err" ? "Status (feil)"
                  : kind === "warn" ? "Status (obs)"
                  : kind === "ok" ? "Status"
                  : "Status";

      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");

      statusBox.innerHTML = `
        <strong>${label}:</strong>
        <span class="mono">${hh}:${mm}:${ss}</span><br>
        ${escapeHtml(msg)}
      `;

      statusTimer = setTimeout(() => {
        statusBox.innerHTML = "";
      }, 3500);
    }

    function setTopButtonsEnabled(isAuthed) {
      // Start ny session krever auth
      startSessionBtn.disabled = !isAuthed;

      // End session / logout+end krever auth, og gir mening selv uten aktiv session (da gjør vi bare signOut)
      topEndSessionBtn.disabled = !isAuthed;
      logoutEndBtn.disabled = !isAuthed;
    }

    function teardownSessionUi() {
      activeSessionId = null;
      activeJoinCode = null;
      lastState = null;

      if (unsubscribe) unsubscribe();
      unsubscribe = null;

      if (leaseTicker) clearInterval(leaseTicker);
      leaseTicker = null;

      sessionBox.innerHTML = "";
      controlsBox.innerHTML = "";
      leaseBox.innerHTML = "";
    }

    function teardownProgramsUi() {
      myPrograms = [];
      currentProgramId = null;
      programsBox.innerHTML = "";
    }

    function renderUser(user) {
      if (!user) { userBox.innerHTML = ""; return; }
      userBox.innerHTML = `
        <strong>Innlogget som:</strong><br>
        ${escapeHtml(user.displayName || "")}<br>
        ${escapeHtml(user.email || "")}<br>
        ownerId (user.uid): <span class="mono">${escapeHtml(user.uid)}</span><br>
        clientId (localStorage): <span class="mono">${escapeHtml(App.getClientId())}</span>
      `;
    }

    function toMillisMaybe(ts) {
      if (!ts) return null;
      if (typeof ts.toMillis === "function") return ts.toMillis();
      if (typeof ts.seconds === "number") return (ts.seconds * 1000) + Math.floor((ts.nanoseconds || 0) / 1e6);
      return null;
    }

    function formatLease(state) {
      if (!state) {
        return `<strong>Controller lease</strong><br>Ingen state/live lest ennå (mangler doc eller tilgang).`;
      }

      const cid = state.controllerId || "(ikke satt)";
      const untilMs = toMillisMaybe(state.controllerLeaseUntil);

      const nowMs = Date.now();
      const active = (untilMs !== null) ? (untilMs > nowMs) : false;
      const remaining = (untilMs !== null) ? Math.max(0, Math.round((untilMs - nowMs) / 1000)) : null;

      const mine = (cid === App.getClientId());

      return `
        <strong>Controller lease</strong><br>
        controllerId: <span class="mono">${escapeHtml(cid)}</span><br>
        status: ${active ? "aktiv" : "utløpt/ikke satt"}<br>
        gjenstår: ${remaining === null ? "-" : (remaining + " sek")}<br>
        min controller: ${mine ? "ja" : "nei"}
      `;
    }

    function renderLease(state) {
      leaseBox.innerHTML = formatLease(state);
    }

    function parseChoices(text) {
      const lines = String(text || "")
        .split("\n")
        .map(x => x.trim())
        .filter(Boolean);

      const choices = [];
      const seen = new Set();

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const parts = line.split("|").map(x => x.trim()).filter(Boolean);

        let id = "";
        let label = "";

        if (parts.length >= 2) {
          id = parts[0];
          label = parts.slice(1).join(" | ");
        } else {
          label = line;
          id = line;
        }

        if (!id || !label) throw new Error("Ugyldig choice på linje " + (i + 1) + ".");
        if (seen.has(id)) throw new Error("Duplisert choice-id: " + id);
        seen.add(id);

        choices.push({ id, label });
      }

      if (choices.length < 2) throw new Error("Multi krever minst 2 choices.");
      return choices;
    }

    function buildUrl(path, params) {
      const u = new URL(path, window.location.href);
      Object.entries(params || {}).forEach(([k, v]) => {
        if (v == null || v === "") return;
        u.searchParams.set(k, String(v));
      });
      return u.toString();
    }

    function openInNewTab(url) {
      window.open(url, "_blank", "noopener");
    }

    async function copyToClipboard(text) {
      const t = String(text || "");
      if (!t) throw new Error("Mangler joinCode å kopiere.");

      if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        await navigator.clipboard.writeText(t);
        return;
      }

      const ta = document.createElement("textarea");
      ta.value = t;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    function renderSessionBox() {
      if (!activeSessionId) {
        sessionBox.innerHTML = "";
        return;
      }

      const displayUrl = (activeJoinCode)
        ? buildUrl("display.html", { joinCode: activeJoinCode })
        : null;

      const collectUrl = (activeJoinCode)
        ? buildUrl("innhenting.html", { joinCode: activeJoinCode })
        : null;

      const canOpen = !!activeJoinCode;

      sessionBox.innerHTML = `
        <strong>Aktiv session</strong><br>
        sessionId: <span class="mono">${escapeHtml(activeSessionId || "-")}</span><br>
        joinCode: <span class="mono">${escapeHtml(activeJoinCode || "-")}</span><br><br>

        <div class="btnRow">
          <button class="btn" id="openDisplayBtn" ${canOpen ? "" : "disabled"}>Åpne Display (joinCode)</button>
          <button class="btn" id="openCollectBtn" ${canOpen ? "" : "disabled"}>Åpne Innhenting (joinCode)</button>
          <button class="btn" id="copyJoinCodeBtn" ${canOpen ? "" : "disabled"}>Kopier joincode</button>
        </div>

        <div class="mt20">
          Display-link: <span class="mono">${escapeHtml(displayUrl || "-")}</span><br>
          Innhenting-link: <span class="mono">${escapeHtml(collectUrl || "-")}</span>
        </div>
      `;

      const openDisplayBtn = document.getElementById("openDisplayBtn");
      const openCollectBtn = document.getElementById("openCollectBtn");
      const copyJoinCodeBtn = document.getElementById("copyJoinCodeBtn");

      if (openDisplayBtn) {
        openDisplayBtn.addEventListener("click", () => {
          if (!activeJoinCode) return;
          openInNewTab(buildUrl("display.html", { joinCode: activeJoinCode }));
          setStatus("Åpnet display i nytt vindu.", "ok");
        });
      }

      if (openCollectBtn) {
        openCollectBtn.addEventListener("click", () => {
          if (!activeJoinCode) return;
          openInNewTab(buildUrl("innhenting.html", { joinCode: activeJoinCode }));
          setStatus("Åpnet innhenting i nytt vindu.", "ok");
        });
      }

      if (copyJoinCodeBtn) {
        copyJoinCodeBtn.addEventListener("click", async () => {
          try {
            await copyToClipboard(activeJoinCode);
            setStatus("Joincode kopiert: " + activeJoinCode, "ok");
          } catch (e) {
            const msg = e && e.message ? e.message : String(e);
            setError(msg);
            setStatus("Kunne ikke kopiere joincode.", "err");
            console.error(e);
          }
        });
      }
    }

    function renderControls() {
      if (!activeSessionId) {
        controlsBox.innerHTML = `<strong>Controller UI</strong><br>Start/velg en aktiv session først.`;
        return;
      }

      const status = lastState && lastState.status ? lastState.status : "(ukjent)";
      const roundId = lastState && lastState.roundId ? lastState.roundId : "-";
      const mode = lastState && lastState.mode ? lastState.mode : "";

      const q = lastState && lastState.question ? lastState.question : null;
      const qText = q && q.text ? String(q.text) : "";

      const multiChoices = (mode === "multi" && q && Array.isArray(q.choices))
        ? q.choices.map(c => `${c.id} | ${c.label}`).join("\n")
        : "yes | ja\nno | nei";

      controlsBox.innerHTML = `
        <strong>Controller UI (Steg 6)</strong><br>
        status: <span class="mono">${escapeHtml(status)}</span> |
        mode: <span class="mono">${escapeHtml(mode || "-")}</span> |
        roundId: <span class="mono">${escapeHtml(roundId)}</span><br><br>

        <strong>Spørsmål</strong><br>
        <label>
          Mode:
          <select id="modeSel" class="inputWide">
            <option value="multi" ${mode === "multi" ? "selected" : ""}>multi</option>
            <option value="likert" ${mode === "likert" ? "selected" : ""}>likert</option>
            <option value="open" ${mode === "open" ? "selected" : ""}>open</option>
            <option value="wordcloud" ${mode === "wordcloud" ? "selected" : ""}>wordcloud</option>
          </select>
        </label>

        <div class="mt20">
          <label>Spørsmålstekst (valgfri, men anbefalt):</label><br>
          <textarea id="qText" class="inputArea" rows="2" placeholder="Skriv spørsmålet her...">${escapeHtml(qText)}</textarea>
        </div>

        <div class="mt20" id="multiBox">
          <label>Multi choices (én per linje): <span class="mono">id | label</span></label><br>
          <textarea id="multiChoices" class="inputArea" rows="5">${escapeHtml(multiChoices)}</textarea>
        </div>

        <div class="mt20 btnRow">
          <button class="btn" id="setQuestionBtn">Set question (mode + question)</button>
          <button class="btn" id="startQuestionBtn">Start (set + reset + collect)</button>
        </div>

        <div class="mt20 btnRow">
          <button class="btn" id="collectBtn">Collect</button>
          <button class="btn" id="resultsBtn">Results</button>
          <button class="btn" id="resetBtn">Reset (ny roundId)</button>
          <button class="btn" id="endSessionBtn">End session</button>
        </div>

        <div class="mt20">
          Tips: Normal flyt er <span class="mono">Set question</span> → <span class="mono">Start</span> → (Collect/Results) → <span class="mono">Reset</span> for neste runde.
        </div>
      `;

      const modeSel = document.getElementById("modeSel");

      document.getElementById("setQuestionBtn").addEventListener("click", async () => {
        try {
          setError("");
          setStatus("", "info");

          const m = modeSel.value;
          const text = (document.getElementById("qText").value || "").trim();

          let question = {};
          if (text) question.text = text;

          if (m === "multi") {
            const rawChoices = document.getElementById("multiChoices").value;
            question.choices = parseChoices(rawChoices);
          }

          await App.setQuestionLease(activeSessionId, m, question);
          setStatus("Spørsmål oppdatert (mode + question).", "ok");
        } catch (err) {
          const msg = (err && err.message) ? err.message : String(err);
          setError(msg);
          setStatus("Set question feilet.", "err");
          console.error(err);
        }
      });

      document.getElementById("startQuestionBtn").addEventListener("click", async () => {
        try {
          setError("");
          setStatus("", "info");

          const m = modeSel.value;
          const text = (document.getElementById("qText").value || "").trim();

          let question = {};
          if (text) question.text = text;

          if (m === "multi") {
            const rawChoices = document.getElementById("multiChoices").value;
            question.choices = parseChoices(rawChoices);
          }

          const res = await App.startQuestionLease(activeSessionId, m, question);
          setStatus("Startet ny runde: " + res.roundId, "ok");
        } catch (err) {
          const msg = (err && err.message) ? err.message : String(err);
          setError(msg);
          setStatus("Start feilet.", "err");
          console.error(err);
        }
      });

      document.getElementById("collectBtn").addEventListener("click", async () => {
        try {
          setError("");
          setStatus("", "info");
          await App.setLiveStatusLease(activeSessionId, "collect");
          setStatus("Status satt til collect.", "ok");
        } catch (err) {
          const msg = (err && err.message) ? err.message : String(err);
          setError(msg);
          setStatus("Collect feilet.", "err");
          console.error(err);
        }
      });

      document.getElementById("resultsBtn").addEventListener("click", async () => {
        try {
          setError("");
          setStatus("", "info");
          await App.setLiveStatusLease(activeSessionId, "results");
          setStatus("Status satt til results.", "ok");
        } catch (err) {
          const msg = (err && err.message) ? err.message : String(err);
          setError(msg);
          setStatus("Results feilet.", "err");
          console.error(err);
        }
      });

      document.getElementById("resetBtn").addEventListener("click", async () => {
        try {
          setError("");
          setStatus("", "info");
          const res = await App.resetRoundLease(activeSessionId);
          setStatus("Ny roundId: " + res.roundId, "ok");
        } catch (err) {
          const msg = (err && err.message) ? err.message : String(err);
          setError(msg);
          setStatus("Reset feilet.", "err");
          console.error(err);
        }
      });

      document.getElementById("endSessionBtn").addEventListener("click", async () => {
        try {
          setError("");
          setStatus("", "info");

          await App.endSession(activeSessionId);

          teardownSessionUi();
          sessionBox.innerHTML = `<strong>Session avsluttet.</strong>`;
          renderLease(null);

          setStatus("Session avsluttet.", "ok");
        } catch (err) {
          const msg = (err && err.message) ? err.message : String(err);
          setError(msg);
          setStatus("End session feilet.", "err");
          console.error(err);
        }
      });
    }

    // --- Steg 7.3 UI ---
    function prettyJson(obj) {
      try { return JSON.stringify(obj, null, 2); } catch { return "{}"; }
    }

    function parseContentJson(raw) {
      const t = String(raw || "").trim();
      if (!t) return {};
      try {
        const v = JSON.parse(t);
        if (v && typeof v === "object" && !Array.isArray(v)) return v;
        // Content må være map i rules -> pakk annet inn
        return { value: v };
      } catch {
        // Content må være map i rules -> pakk tekst inn
        return { text: t };
      }
    }

    async function refreshMyPrograms() {
      if (!App.auth || !App.auth.currentUser) {
        myPrograms = [];
        currentProgramId = null;
        renderPrograms();
        return;
      }

      const list = await App.listMyPrograms();
      myPrograms = list;
      // behold currentProgramId hvis den fortsatt finnes
      if (currentProgramId && !myPrograms.some(p => p.programId === currentProgramId)) {
        currentProgramId = null;
      }
      renderPrograms();
    }

    function renderPrograms() {
      const isAuthed = !!(App.auth && App.auth.currentUser);

      const rows = myPrograms.map(p => {
        const d = p.data || {};
        const title = d.title || "(uten tittel)";
        const vis = d.visibility || "private";
        const mark = (p.programId === currentProgramId) ? " <strong>(valgt)</strong>" : "";
        return `
          <div class="mt10">
            <button class="btn" data-pid="${escapeHtml(p.programId)}">Åpne</button>
            <span class="mono">${escapeHtml(p.programId)}</span> – ${escapeHtml(title)} [${escapeHtml(vis)}]${mark}
          </div>
        `;
      }).join("");

      const current = currentProgramId
        ? myPrograms.find(x => x.programId === currentProgramId)
        : null;

      const curData = current ? (current.data || {}) : null;

      const titleVal = curData && curData.title ? String(curData.title) : "";
      const visVal = curData && curData.visibility ? String(curData.visibility) : "private";
      const srcVal = (curData && Object.prototype.hasOwnProperty.call(curData, "sourceProgramId")) ? (curData.sourceProgramId || "") : "";
      const contentVal = curData && curData.content ? prettyJson(curData.content) : "{}";

      programsBox.innerHTML = `
        <strong>Programmer (Steg 7.3)</strong><br>
        <div class="mt10 btnRow">
          <button class="btn" id="createProgramBtn" ${isAuthed ? "" : "disabled"}>Opprett nytt program</button>
          <button class="btn" id="refreshProgramsBtn" ${isAuthed ? "" : "disabled"}>Oppdater liste</button>
        </div>

        <div class="mt20">
          <strong>Mine programmer</strong><br>
          ${rows || "<div class='mt10'>(ingen ennå)</div>"}
        </div>

        <div class="mt20">
          <strong>Rediger valgt program</strong><br>
          programId: <span class="mono">${escapeHtml(currentProgramId || "-")}</span><br><br>

          <label>Tittel:</label><br>
          <input id="progTitle" class="inputWide" value="${escapeHtml(titleVal)}" ${currentProgramId ? "" : "disabled"} /><br><br>

          <label>Visibility:</label><br>
          <select id="progVis" class="inputWide" ${currentProgramId ? "" : "disabled"}>
            <option value="private" ${visVal === "private" ? "selected" : ""}>private</option>
            <option value="shared" ${visVal === "shared" ? "selected" : ""}>shared</option>
            <option value="library" ${visVal === "library" ? "selected" : ""}>library</option>
          </select><br><br>

          <label>sourceProgramId (valgfri):</label><br>
          <input id="progSource" class="inputWide" value="${escapeHtml(srcVal)}" ${currentProgramId ? "" : "disabled"} /><br><br>

          <label>content (JSON – lagres som map):</label><br>
          <textarea id="progContent" class="inputArea" rows="8" ${currentProgramId ? "" : "disabled"}>${escapeHtml(contentVal)}</textarea>

          <div class="mt20 btnRow">
            <button class="btn" id="saveProgramBtn" ${currentProgramId ? "" : "disabled"}>Lagre/oppdatere program</button>
            <button class="btn" id="deleteProgramBtn" ${currentProgramId ? "" : "disabled"}>Slette program</button>
          </div>
        </div>
      `;

      const createBtn = document.getElementById("createProgramBtn");
      const refreshBtn = document.getElementById("refreshProgramsBtn");

      if (createBtn) {
        createBtn.addEventListener("click", async () => {
          try {
            setError("");
            setStatus("", "info");

            const res = await App.createProgram({ title: "Nytt program", visibility: "private", content: {} });
            currentProgramId = res.programId;

            await refreshMyPrograms();
            setStatus("Opprettet nytt program.", "ok");
          } catch (e) {
            const msg = e && e.message ? e.message : String(e);
            setError(msg);
            setStatus("Kunne ikke opprette program.", "err");
            console.error(e);
          }
        });
      }

      if (refreshBtn) {
        refreshBtn.addEventListener("click", async () => {
          try {
            setError("");
            setStatus("", "info");
            await refreshMyPrograms();
            setStatus("Programliste oppdatert.", "ok");
          } catch (e) {
            const msg = e && e.message ? e.message : String(e);
            setError(msg);
            setStatus("Kunne ikke oppdatere programliste.", "err");
            console.error(e);
          }
        });
      }

      // Åpne program
      programsBox.querySelectorAll("button[data-pid]").forEach(btn => {
        btn.addEventListener("click", () => {
          currentProgramId = btn.getAttribute("data-pid");
          renderPrograms();
          setStatus("Program åpnet.", "ok");
        });
      });

      const saveBtn = document.getElementById("saveProgramBtn");
      if (saveBtn) {
        saveBtn.addEventListener("click", async () => {
          try {
            setError("");
            setStatus("", "info");

            if (!currentProgramId) throw new Error("Ingen program valgt.");

            const title = (document.getElementById("progTitle").value || "").trim();
            const visibility = document.getElementById("progVis").value;
            const sourceProgramIdRaw = (document.getElementById("progSource").value || "").trim();
            const contentRaw = document.getElementById("progContent").value;

            const content = parseContentJson(contentRaw);
            const sourceProgramId = sourceProgramIdRaw ? sourceProgramIdRaw : null;

            await App.saveProgram(currentProgramId, { title, visibility, content, sourceProgramId });

            await refreshMyPrograms();
            setStatus("Program lagret.", "ok");
          } catch (e) {
            const msg = e && e.message ? e.message : String(e);
            setError(msg);
            setStatus("Kunne ikke lagre program.", "err");
            console.error(e);
          }
        });
      }

      const delBtn = document.getElementById("deleteProgramBtn");
      if (delBtn) {
        delBtn.addEventListener("click", async () => {
          try {
            setError("");
            setStatus("", "info");

            if (!currentProgramId) throw new Error("Ingen program valgt.");

            // Minimal, men eksplisitt: confirm
            const ok = window.confirm("Slette program " + currentProgramId + "?");
            if (!ok) return;

            await App.deleteProgram(currentProgramId);
            currentProgramId = null;

            await refreshMyPrograms();
            setStatus("Program slettet.", "ok");
          } catch (e) {
            const msg = e && e.message ? e.message : String(e);
            setError(msg);
            setStatus("Kunne ikke slette program.", "err");
            console.error(e);
          }
        });
      }
    }

    function startLeaseTicker() {
      if (leaseTicker) clearInterval(leaseTicker);
      leaseTicker = setInterval(() => {
        renderLease(lastState);
      }, 1000);
    }

    function attachStateListener(sessionId) {
      if (unsubscribe) unsubscribe();

      unsubscribe = App.listenLiveState(
        sessionId,
        (data) => {
          lastState = data;
          renderLease(data);
          renderControls();
        },
        (err) => {
          setError("Kunne ikke lese state/live: " + (err && err.message ? err.message : String(err)));
          setStatus("Kunne ikke lese state/live.", "err");
        }
      );

      startLeaseTicker();
    }

    loginBtn.addEventListener("click", async () => {
      try {
        setError("");
        setStatus("", "info");
        const user = await App.ensureSignedInWithGoogle();
        renderUser(user);
        setStatus("Innlogging ok.", "ok");
      } catch (err) {
        setError(err && err.message ? err.message : String(err));
        setStatus("Innlogging feilet.", "err");
        console.error(err);
      }
    });

    // TOPP: End session (fortsett innlogget)
    topEndSessionBtn.addEventListener("click", async () => {
      try {
        setError("");
        setStatus("", "info");

        if (!activeSessionId) {
          setStatus("Ingen aktiv session å avslutte.", "warn");
          return;
        }

        await App.endSession(activeSessionId);

        teardownSessionUi();
        sessionBox.innerHTML = `<strong>Session avsluttet.</strong>`;
        renderLease(null);

        setStatus("Session avsluttet.", "ok");
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        setError(msg);
        setStatus("End session feilet.", "err");
        console.error(err);
      }
    });

    // TOPP: Logg ut + end session (én knapp)
    logoutEndBtn.addEventListener("click", async () => {
      try {
        setError("");
        setStatus("", "info");

        if (activeSessionId) {
          await App.endSessionAndSignOut(activeSessionId);
        } else {
          // Ingen aktiv session -> bare logg ut
          await App.signOut();
        }

        // onAuthStateChanged rydder resten, men vi kan være ekstra tydelige
        teardownSessionUi();
        teardownProgramsUi();
        setStatus("Logget ut.", "ok");
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        setError(msg);
        setStatus("Logg ut feilet.", "err");
        console.error(err);
      }
    });

    startSessionBtn.addEventListener("click", async () => {
      try {
        setError("");
        setStatus("", "info");
        const res = await App.startOrReplaceSession({ saveResults: true, programId: null });

        activeSessionId = res.sessionId;
        activeJoinCode = res.joinCode;

        renderSessionBox();
        attachStateListener(res.sessionId);
        setStatus("Ny session startet.", "ok");
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        setError(msg);
        setStatus("Kunne ikke starte ny session.", "err");
        console.error(err);
      }
    });

    App.auth.onAuthStateChanged(async (user) => {
      renderUser(user);
      setTopButtonsEnabled(!!user);

      if (!user) {
        teardownSessionUi();
        teardownProgramsUi();
        statusBox.innerHTML = "";
        setError("");
        return;
      }

      // Steg 7.3: reads only (ingen writes)
      try {
        await refreshMyPrograms();
      } catch (e) {
        setError(e && e.message ? e.message : String(e));
        setStatus("Kunne ikke laste programliste.", "err");
        console.error(e);
      }

      try {
        setError("");
        const info = await App.getActiveSessionInfo(user.uid);
        if (info && info.activeSessionId) {
          activeSessionId = info.activeSessionId;
          activeJoinCode = info.activeJoinCode;

          renderSessionBox();
          attachStateListener(info.activeSessionId);
          setStatus("Aktiv session lastet (ingen writes).", "ok");
        } else {
          activeSessionId = null;
          activeJoinCode = null;
          renderSessionBox();
          leaseBox.innerHTML = `<strong>Controller lease</strong><br>Ingen aktiv session funnet på owner-peker.`;
          renderControls();
          setStatus("Ingen aktiv session funnet.", "warn");
        }
      } catch (e) {
        setError(e && e.message ? e.message : String(e));
        setStatus("Kunne ikke lese owner-peker.", "err");
        console.error(e);
      }
    });
  </script>
</body>
</html>
